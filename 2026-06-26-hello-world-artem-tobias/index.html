<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello World ❤️</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f0f0f 0%, #1a1a2e 50%, #0f0f0f 100%);
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
    }

    .container {
      text-align: center;
      position: relative;
    }

    .greeting {
      font-size: clamp(2rem, 6vw, 4rem);
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.8s ease forwards 0.2s;
    }

    .names {
      font-size: clamp(1.2rem, 4vw, 2rem);
      color: #a0a0b0;
      font-weight: 400;
      margin-bottom: 2.5rem;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.8s ease forwards 0.5s;
    }

    .names span {
      color: #e040fb;
      font-weight: 600;
    }

    .heart {
      font-size: clamp(3rem, 10vw, 6rem);
      display: inline-block;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.8s, pulse 1.6s ease-in-out infinite 1.6s;
      cursor: pointer;
      user-select: none;
      transition: transform 0.1s ease;
    }

    .heart:active {
      transform: scale(0.85);
    }

    .tagline {
      margin-top: 2rem;
      font-size: 0.9rem;
      color: #444;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 1.2s;
    }

    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      bottom: -10px;
      font-size: 1.2rem;
      animation: floatUp linear forwards;
      opacity: 0;
    }

    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.12); }
    }

    @keyframes floatUp {
      0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
    }
  </style>
</head>
<body>

  <div class="particles" id="particles"></div>

  <div class="container">
    <div class="greeting">Hello World</div>
    <div class="names">von <span>Artem</span> &amp; <span>Tobias</span></div>
    <div class="heart" id="heart" title="Klick mich!">❤️</div>
    <div class="tagline">Made with Claude Code &nbsp;·&nbsp; 2026</div>
  </div>

  <script>
    const heart = document.getElementById('heart');
    const container = document.getElementById('particles');

    function spawnParticles() {
      const emojis = ['❤️', '✨', '🚀', '💜', '⭐'];
      const count = 8;
      for (let i = 0; i < count; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        p.style.left = (10 + Math.random() * 80) + '%';
        p.style.fontSize = (0.8 + Math.random() * 1.4) + 'rem';
        const dur = 2.5 + Math.random() * 2;
        p.style.animationDuration = dur + 's';
        p.style.animationDelay = (Math.random() * 0.4) + 's';
        container.appendChild(p);
        setTimeout(() => p.remove(), (dur + 0.5) * 1000);
      }
    }

    heart.addEventListener('click', spawnParticles);

    // Auto-spawn on load after a short delay
    setTimeout(spawnParticles, 1800);
  </script>

</body>
</html>
