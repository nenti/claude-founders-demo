<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello, World! ✨</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>👋</text></svg>" />
  <style>
    :root { --hue: 210; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      min-height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      color: #fff;
      background: linear-gradient(135deg,
        hsl(var(--hue), 80%, 55%),
        hsl(calc(var(--hue) + 60), 80%, 50%));
      transition: background 1.2s ease;
      text-align: center;
      user-select: none;
    }
    .stage { padding: 2rem; position: relative; z-index: 2; }
    .wave { font-size: clamp(4rem, 18vw, 11rem); display: inline-block; transform-origin: 70% 70%; animation: wave 2.4s ease-in-out infinite; }
    @keyframes wave {
      0%, 60%, 100% { transform: rotate(0deg); }
      10% { transform: rotate(16deg); }
      20% { transform: rotate(-8deg); }
      30% { transform: rotate(16deg); }
      40% { transform: rotate(-4deg); }
      50% { transform: rotate(10deg); }
    }
    h1 {
      font-size: clamp(2.2rem, 9vw, 5.5rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      margin: 0.2em 0 0.1em;
      text-shadow: 0 6px 30px rgba(0,0,0,0.25);
      min-height: 1.1em;
    }
    .lang { opacity: 0.85; font-size: clamp(0.9rem, 3vw, 1.3rem); margin-bottom: 1.6rem; letter-spacing: 0.08em; text-transform: uppercase; }
    button {
      font: inherit;
      font-weight: 700;
      font-size: 1.05rem;
      padding: 0.85rem 1.9rem;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      color: hsl(var(--hue), 70%, 35%);
      background: #fff;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      transition: transform 0.12s ease, box-shadow 0.2s ease;
    }
    button:hover { transform: translateY(-2px) scale(1.03); box-shadow: 0 14px 38px rgba(0,0,0,0.28); }
    button:active { transform: translateY(0) scale(0.98); }
    .hint { margin-top: 1.4rem; font-size: 0.8rem; opacity: 0.65; }
    .count { margin-top: 0.5rem; font-size: 0.8rem; opacity: 0.55; height: 1em; }
    canvas { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
    .credit { position: fixed; bottom: 12px; left: 0; right: 0; text-align: center; font-size: 0.7rem; opacity: 0.5; z-index: 2; }
  </style>
</head>
<body>
  <canvas id="confetti"></canvas>
  <main class="stage">
    <div class="wave">👋</div>
    <h1 id="greeting">Hello, World!</h1>
    <div class="lang" id="langlabel">English</div>
    <button id="btn">Say hello again 🎉</button>
    <div class="count" id="count"></div>
    <p class="hint">Tap anywhere for confetti · every click switches language &amp; color</p>
  </main>
  <div class="credit">Built with Claude Code · hosted on Nyxory</div>

  <script>
    const greetings = [
      ["Hello, World!", "English"],
      ["Hallo, Welt!", "Deutsch"],
      ["¡Hola, Mundo!", "Español"],
      ["Bonjour, le Monde!", "Français"],
      ["Ciao, Mondo!", "Italiano"],
      ["Olá, Mundo!", "Português"],
      ["こんにちは、世界！", "日本語"],
      ["안녕, 세계!", "한국어"],
      ["你好，世界！", "中文"],
      ["Привет, мир!", "Русский"],
      ["مرحبا يا عالم!", "العربية"],
      ["नमस्ते दुनिया!", "हिन्दी"],
      ["Hej, Världen!", "Svenska"],
      ["Merhaba, Dünya!", "Türkçe"],
      ["Γειά σου, Κόσμε!", "Ελληνικά"],
    ];

    const greetingEl = document.getElementById("greeting");
    const langEl = document.getElementById("langlabel");
    const countEl = document.getElementById("count");
    const btn = document.getElementById("btn");
    let i = 0;
    let clicks = 0;

    function next() {
      i = (i + 1) % greetings.length;
      const [text, lang] = greetings[i];
      greetingEl.textContent = text;
      langEl.textContent = lang;
      document.documentElement.style.setProperty("--hue", (i * 47) % 360);
      clicks++;
      countEl.textContent = clicks === 1 ? "1 hello so far" : clicks + " hellos so far";
      burst(window.innerWidth / 2, window.innerHeight / 2, 60);
    }
    btn.addEventListener("click", (e) => { e.stopPropagation(); next(); });

    // ---- Confetti ----
    const canvas = document.getElementById("confetti");
    const ctx = canvas.getContext("2d");
    let particles = [];
    function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }
    resize();
    addEventListener("resize", resize);

    const colors = ["#ffd166", "#ef476f", "#06d6a0", "#118ab2", "#fff", "#f78c6b", "#c792ea"];
    function burst(x, y, n) {
      for (let k = 0; k < n; k++) {
        const a = Math.random() * Math.PI * 2;
        const sp = 2 + Math.random() * 7;
        particles.push({
          x, y,
          vx: Math.cos(a) * sp,
          vy: Math.sin(a) * sp - 3,
          life: 1,
          size: 4 + Math.random() * 7,
          color: colors[(Math.random() * colors.length) | 0],
          rot: Math.random() * Math.PI,
          vr: (Math.random() - 0.5) * 0.3,
        });
      }
    }

    function tick() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles = particles.filter((p) => p.life > 0);
      for (const p of particles) {
        p.vy += 0.16;
        p.x += p.vx;
        p.y += p.vy;
        p.rot += p.vr;
        p.life -= 0.012;
        ctx.save();
        ctx.globalAlpha = Math.max(p.life, 0);
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 0.6);
        ctx.restore();
      }
      requestAnimationFrame(tick);
    }
    tick();

    addEventListener("click", (e) => burst(e.clientX, e.clientY, 28));
    // Welcome burst
    setTimeout(() => burst(innerWidth / 2, innerHeight / 2, 80), 350);
  </script>
</body>
</html>
