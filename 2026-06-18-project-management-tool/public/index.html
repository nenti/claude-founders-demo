<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AlignHQ — Project Management</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%236366f1'/%3E%3Ctext x='50' y='68' font-size='58' text-anchor='middle' fill='white' font-family='sans-serif' font-weight='700'%3EA%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div id="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">A</div>
        <div>
          <div class="brand-name">AlignHQ</div>
          <div class="brand-tag">clarity for teams</div>
        </div>
      </div>

      <div class="project-picker">
        <label>Project</label>
        <select id="projectSelect"></select>
      </div>

      <nav class="nav" id="nav">
        <button class="nav-item active" data-view="overview"><span class="ni">◎</span> Overview</button>
        <button class="nav-item" data-view="board"><span class="ni">▦</span> Board</button>
        <button class="nav-item" data-view="decisions"><span class="ni">✦</span> Decisions</button>
        <button class="nav-item" data-view="docs"><span class="ni">▤</span> Docs</button>
        <button class="nav-item" data-view="team"><span class="ni">◍</span> Team &amp; Activity</button>
      </nav>

      <div class="sidebar-foot">
        <div class="dot-ok"></div> Deployed on Nyxory
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h1 id="viewTitle">Overview</h1>
          <p id="viewSubtitle" class="muted"></p>
        </div>
        <div class="topbar-actions" id="topbarActions"></div>
      </header>
      <section id="viewRoot" class="view-root"></section>
    </main>
  </div>

  <div id="modalRoot"></div>
  <div id="toastRoot"></div>

  <script src="/app.js"></script>
</body>
</html>
